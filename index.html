<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy — Mapa del Canal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:       #020208;
      --border:   rgba(0,210,255,0.08);
      --border-hi:rgba(0,210,255,0.20);
      --text:     #bfd0e0;
      --text-dim: rgba(191,208,224,0.38);
      --c-root:   #a855f7;
      --c-proxy:  #22d3ee;
      --c-proj:   #fb923c;
      --c-cont:   #4ade80;
      --mono:     'JetBrains Mono', monospace;
    }

    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; font-size:12px; }

    /* Rejilla de fondo */
    #grid { position:fixed; inset:0; z-index:1; pointer-events:none;
      background-image: linear-gradient(rgba(0,210,255,.022) 1px,transparent 1px),
                        linear-gradient(90deg,rgba(0,210,255,.022) 1px,transparent 1px);
      background-size:44px 44px; }

    /* Fondos por categoría */
    .bg-layer { position:fixed; inset:0; background-size:cover; background-position:center; transition:opacity 1.2s ease; opacity:0; z-index:0; }
    .bg-layer.active { opacity:1; }
    .bg-overlay { position:fixed; inset:0; background:radial-gradient(ellipse at 40% 35%,rgba(2,2,10,.4) 0%,rgba(2,2,10,.92) 75%); z-index:1; }

    /* Partículas */
    #particles { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
    .particle { position:absolute; width:1px; height:1px; background:rgba(0,210,255,.32); animation:pfloat linear infinite; }
    @keyframes pfloat { 0%{transform:translateY(100vh) scale(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(-10vh) scale(1);opacity:0} }

    /* Cytoscape */
    #cy { position:fixed; inset:40px 0 0 0; z-index:3; background:transparent; }

    /* Barra superior */
    #topbar {
      position:fixed; top:0; left:0; right:0; height:40px;
      background:rgba(2,2,12,.85); border-bottom:1px solid var(--border-hi);
      backdrop-filter:blur(20px); display:flex; align-items:center;
      padding:0 14px; gap:10px; z-index:200;
    }
    #topbar-logo { font-family:var(--mono); font-size:10px; color:var(--c-proxy); letter-spacing:3px; text-transform:uppercase; flex-shrink:0; text-shadow:0 0 14px var(--c-proxy); }
    .t-sep { width:1px; height:16px; background:var(--border-hi); flex-shrink:0; }
    #breadcrumb { display:flex; align-items:center; gap:4px; font-size:10px; overflow:hidden; flex:1; font-family:var(--mono); }
    .bc { color:rgba(191,208,224,.22); white-space:nowrap; cursor:pointer; transition:color .2s; }
    .bc:hover { color:var(--c-proxy); }
    .bc.cur { color:rgba(191,208,224,.65); cursor:default; }
    .bc-sep { color:var(--border-hi); }
    #topbar-hint { font-size:9px; color:rgba(191,208,224,.14); white-space:nowrap; flex-shrink:0; font-family:var(--mono); }

    /* Panel lateral derecho */
    #panel {
      position:fixed; top:40px; right:0; bottom:0; width:270px;
      background:rgba(3,3,16,.92); border-left:1px solid var(--border-hi);
      backdrop-filter:blur(28px);
      transform:translateX(100%); transition:transform .32s cubic-bezier(.4,0,.2,1);
      z-index:150; overflow-y:auto;
      scrollbar-width:thin; scrollbar-color:rgba(0,210,255,.08) transparent;
    }
    #panel.open { transform:translateX(0); }
    #panel-inner { padding:20px 18px 56px; }

    #btn-close {
      position:absolute; top:10px; right:10px;
      background:transparent; border:1px solid var(--border);
      color:var(--text-dim); width:22px; height:22px;
      cursor:pointer; font-size:10px; font-family:var(--mono);
      display:flex; align-items:center; justify-content:center; transition:all .2s;
    }
    #btn-close:hover { border-color:var(--c-proxy); color:var(--c-proxy); }

    #p-cat   { font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; margin-bottom:7px; }
    #p-title { font-size:17px; font-weight:700; color:#fff; line-height:1.3; margin-bottom:14px; }
    #p-body  { font-size:11px; line-height:1.88; color:rgba(191,208,224,.6); }
    #p-body p { margin-bottom:11px; }
    #p-body p:last-child { margin-bottom:0; }
    #p-body strong { color:rgba(191,208,224,.9); }
    #p-body em     { color:rgba(191,208,224,.74); }
    #p-body a      { color:var(--c-proxy); text-decoration:none; }
    #p-body a:hover{ text-decoration:underline; }
    #p-body ul  { margin:7px 0 11px 16px; line-height:2; }
    #p-body pre { font-family:var(--mono); font-size:9px; color:rgba(191,208,224,.5); line-height:1.7;
                  background:rgba(0,210,255,.03); border:1px solid var(--border);
                  padding:9px 10px; margin:9px 0; overflow-x:auto; white-space:pre; }
    .hr { height:1px; background:var(--border); margin:14px 0; }
    #p-body img { width:100%; margin-bottom:11px; display:block; object-fit:cover; border:1px solid var(--border); }

    .lbtn {
      display:inline-flex; align-items:center; gap:5px;
      margin-top:9px; padding:6px 12px;
      background:rgba(0,210,255,.04); border:1px solid rgba(0,210,255,.18);
      color:var(--c-proxy) !important; font-size:10px; font-family:var(--mono);
      text-decoration:none !important; transition:all .2s;
    }
    .lbtn:hover { background:rgba(0,210,255,.1) !important; border-color:rgba(0,210,255,.38); }

    .badge {
      display:inline-block; padding:2px 8px;
      font-family:var(--mono); font-size:8px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase; margin-bottom:9px;
      background:rgba(0,210,255,.05); color:var(--c-proxy); border:1px solid rgba(0,210,255,.18);
    }

    /* Leyenda */
    #legend {
      position:fixed; bottom:212px; left:10px;
      background:rgba(2,2,12,.72); border:1px solid var(--border);
      padding:9px 13px; z-index:100; backdrop-filter:blur(18px);
    }
    #legend h4 { font-family:var(--mono); font-size:7px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(191,208,224,.2); margin-bottom:7px; }
    .li { display:flex; align-items:center; gap:6px; font-size:9px; color:rgba(191,208,224,.32); margin-bottom:4px; }
    .li:last-child { margin-bottom:0; }
    .ld { width:6px; height:6px; flex-shrink:0; box-shadow:0 0 5px currentColor; }

    /* Minimapa sephiroth */
    #sephiroth { position:fixed; bottom:10px; left:10px; width:160px; height:195px; z-index:100; pointer-events:auto; opacity:.38; transition:opacity .4s; }
    #sephiroth:hover { opacity:.9; }
    #sephiroth line { stroke:rgba(0,210,255,.07); stroke-width:1; transition:stroke .4s; }
    #sephiroth line.path-active { stroke:rgba(0,210,255,.28); stroke-width:1.5; }
    #sephiroth circle { cursor:pointer; transition:r .3s,fill-opacity .3s; }
    #sephiroth circle:hover { r:8; fill-opacity:1; }
    #sephiroth .seph-active { r:8; fill-opacity:1; filter:drop-shadow(0 0 5px currentColor); }
    #sephiroth .seph-label { font-family:var(--mono); font-size:5.5px; fill:rgba(191,208,224,.22); text-anchor:middle; pointer-events:none; }
    #sephiroth .seph-label.label-active { fill:rgba(191,208,224,.82); }
  </style>
</head>

//  PARTÍCULAS
// ════════════════════════════════════════════════════════
(function(){
  const c = document.getElementById('particles');
  for (let i=0;i<28;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.left = Math.random()*100+'%';
    p.style.animationDuration = (14+Math.random()*26)+'s';
    p.style.animationDelay   = (Math.random()*22)+'s';
    const s = (.8+Math.random()*1.4)+'px';
    p.style.width = p.style.height = s;
    c.appendChild(p);
  }
})();

const BG_MAP = {root:'bg-root',proxy:'bg-proxy',proyectos:'bg-proyectos',contenidos:'bg-contenidos'};
let currentBg = null;
function switchBg(cat){
  const id = BG_MAP[cat]||BG_MAP.root;
  if(id===currentBg) return;
  document.querySelectorAll('.bg-layer').forEach(el=>el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentBg = id;
}

// ════════════════════════════════════════════════════════
//  LAYOUT DE ÁRBOL (más vertical que horizontal)
// ════════════════════════════════════════════════════════
function computeLayout(){
  const HGAP=62, VGAP=148;
  const lv={};
  function countLeaves(id){
    const k=CHILDREN[id]||[];
    if(!k.length){lv[id]=1;return 1;}
    let s=0;k.forEach(c=>s+=countLeaves(c));lv[id]=s;return s;
  }
  countLeaves('canal');
  const pos={};
  function assign(id,depth,xStart){
    const k=CHILDREN[id]||[];
    const span=(lv[id]||1)*HGAP;
    pos[id]={x:xStart+span/2,y:depth*VGAP};
    let cur=xStart;
    k.forEach(c=>{assign(c,depth+1,cur);cur+=(lv[c]||1)*HGAP;});
  }
  assign('canal',0,0);
  Object.keys(NODES).forEach(id=>{if(!pos[id])pos[id]={x:0,y:700};});
  return pos;
}

// ════════════════════════════════════════════════════════
//  CONSTRUIR EL GRAFO COMPLETO
// ════════════════════════════════════════════════════════
let basePos={};   // posiciones base para la animación
let selId=null;

function buildGraph(){
  stopAnim();
  cy.elements().remove();
  basePos = computeLayout();

  Object.values(NODES).forEach(n=>{
    const p=basePos[n.id]||{x:0,y:0};
    cy.add({
      group:'nodes',
      data:{id:n.id,label:n.label,category:n.category,type:n.type||'',image:n.image||'none'},
      position:{x:p.x,y:p.y},
    });
  });

  let ei=0;
  Object.entries(CHILDREN).forEach(([pid,kids])=>{
    kids.forEach(cid=>{
      if(NODES[pid]&&NODES[cid])
        cy.add({group:'edges',data:{id:'e'+(ei++),source:pid,target:cid}});
    });
  });

  cy.fit(cy.elements(),60);
  cy.nodes().ungrabify(); // garantizar que no son arrastrables
  applySelection(selId||'canal');
  startAnim();
}

// ════════════════════════════════════════════════════════
//  SELECCIONAR NODO — resaltar vecindad, abrir panel
// ════════════════════════════════════════════════════════
function applySelection(id, openPan){
  if(!NODES[id]) return;
  selId=id;
  const nbrs=new Set([...(CHILDREN[id]||[]),...(PARENT[id]!=null?[PARENT[id]]:[] )]);

  // Limpiar estilos inline previos del glow antes de cambiar clases
  cy.nodes().removeStyle('shadow-blur shadow-opacity border-opacity border-width');

  cy.nodes().forEach(node=>{
    node.removeClass('sel nbr far');
    const nid=node.id();
    if(nid===id)          node.addClass('sel');
    else if(nbrs.has(nid))node.addClass('nbr');
    else                  node.addClass('far');
  });
  cy.edges().forEach(edge=>{
    edge.removeClass('e-on e-off');
    const s=edge.source().id(),t=edge.target().id();
    if(s===id||t===id)edge.addClass('e-on');
    else              edge.addClass('e-off');
  });

  updateBreadcrumb(id);
  updateSephiroth(id);
  switchBg(NODES[id].category);
  if(openPan!==false) openPanel(id);
}

// ════════════════════════════════════════════════════════
//  PANEL LATERAL
// ════════════════════════════════════════════════════════
function openPanel(id){
  const d=CONTENT[id];
  if(!d) return;
  document.getElementById('p-cat').innerHTML='<span style="color:'+d.color+'">'+d.category+'</span>';
  document.getElementById('p-title').textContent=d.title;
  document.getElementById('p-body').innerHTML=d.html;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

// ════════════════════════════════════════════════════════
//  BREADCRUMB
// ════════════════════════════════════════════════════════
function pathTo(id){
  const p=[];let c=id;
  while(c!=null){p.unshift(c);c=PARENT[c];}
  return p;
}
function updateBreadcrumb(id){
  const path=pathTo(id);
  document.getElementById('breadcrumb').innerHTML=path.map((nid,i)=>{
    const lbl=NODES[nid].label.replace('\n',' ');
    const sep=i>0?'<span class="bc-sep"> / </span>':'';
    if(i===path.length-1) return sep+'<span class="bc cur">'+lbl+'</span>';
    return sep+'<span class="bc" onclick="applySelection(\''+nid+'\',true)">'+lbl+'</span>';
  }).join('');
}

// ════════════════════════════════════════════════════════
//  EVENTOS DE CLICK
//  Pausamos la animación en mousedown para que el nodo
//  esté quieto cuando Cytoscape detecta el tap.
// ════════════════════════════════════════════════════════
document.getElementById('cy').addEventListener('mousedown', ()=> stopAnim());
document.addEventListener('mouseup', ()=> setTimeout(startAnim, 40));

cy.on('tap','node', evt=> applySelection(evt.target.id(), true));
cy.on('tap', evt=>{ if(evt.target===cy) closePanel(); });

// Cursor pointer sobre nodos
cy.on('mouseover','node',()=>document.body.style.cursor='pointer');
cy.on('mouseout', 'node',()=>document.body.style.cursor='default');

// Hover glow
cy.on('mouseover','node',evt=>{
  if(!evt.target.hasClass('sel'))
    evt.target.style({'border-width':2,'border-opacity':.8,'shadow-blur':32,'shadow-opacity':.65});
});
cy.on('mouseout','node',evt=>{
  if(!evt.target.hasClass('sel'))
    evt.target.style({'border-width':1,'border-opacity':evt.target.hasClass('far')?.12:.45,'shadow-blur':22});
});

// ════════════════════════════════════════════════════════
//  ANIMACIÓN ALGA — los nodos flotan y vuelven solos
// ════════════════════════════════════════════════════════
let animFrame=null, animStart=null, animRunning=false;

function animLoop(ts){
  if(!animRunning) return;
  if(!animStart) animStart=ts;
  const t=(ts-animStart)/1000;

  try{
    cy.nodes().forEach((node,i)=>{
      if(!node.inside()) return;
      const isSel=node.hasClass('sel');
      const isNbr=node.hasClass('nbr');
      const id=node.id();
      const bp=basePos[id];
      if(!bp) return;

      // Los nodos lejanos oscilan más, los cercanos casi quietos
      const amp  = isSel?1.2 : isNbr?3.0 : 7.0;
      const spd  = .4+(i%7)*.06;
      const ph   = i*2.1+(id.charCodeAt(0)||0)*.09;

      // Posición oscila en torno a base → vuelve sola
      node.position({
        x: bp.x + amp*Math.sin(t*spd+ph),
        y: bp.y + amp*.65*Math.cos(t*spd*.8+ph+1.3),
      });

      // Glow pulsante en el nodo seleccionado (solo sombra, no tamaño)
      if(isSel){
        const s=Math.sin(t*1.55);
        node.style({
          'shadow-opacity':+(.62+.22*s).toFixed(2),
          'shadow-blur':Math.round(36+11*s),
          'border-opacity':+(.65+.18*s).toFixed(2),
        });
      }
    });

    // Pulso en aristas activas
    cy.edges('.e-on').forEach((edge,i)=>{
      if(!edge.inside()) return;
      edge.style('opacity',+(.68+.22*Math.sin(t*1.4+i)).toFixed(2));
    });
  }catch(e){}

  if(animRunning) animFrame=requestAnimationFrame(animLoop);
}

function startAnim(){
  stopAnim();
  animStart=null; animRunning=true;
  animFrame=requestAnimationFrame(animLoop);
}
function stopAnim(){
  animRunning=false;
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
}

// ════════════════════════════════════════════════════════
//  MINIMAPA SEPHIROTH
// ════════════════════════════════════════════════════════
const SEPH_COLORS={root:'#a855f7',proxy:'#22d3ee',proyectos:'#fb923c',contenidos:'#4ade80'};
const SEPH_POS={
  canal:    {x:80,y:16},
  proxy:    {x:35,y:46},  proyectos:{x:80,y:52},  contenidos:{x:125,y:46},
  autor:    {x:22,y:78},  libros:   {x:48,y:82},  ayudar:    {x:35,y:108},
  ariadna:  {x:65,y:82},  teseo:    {x:80,y:96},  galatea:   {x:95,y:82},
  tematicas:{x:125,y:78},
  contacto: {x:12,y:130}, linktree: {x:32,y:135},
  polaris:  {x:35,y:158}, arcana:   {x:52,y:164}, grimorio:  {x:18,y:164},
  poetica:  {x:112,y:108},ciencia:  {x:138,y:108},filosofia: {x:125,y:135},
};

function computeSephPos(){
  const res={...SEPH_POS};
  const queue=['canal'],seen=new Set(['canal']);
  while(queue.length){
    const pid=queue.shift();
    (CHILDREN[pid]||[]).forEach(c=>{if(!seen.has(c)){seen.add(c);queue.push(c);}});
    if(!res[pid]) continue;
    const unpos=(CHILDREN[pid]||[]).filter(c=>!SEPH_POS[c]);
    if(!unpos.length) continue;
    const spread=(unpos.length-1)*14;
    unpos.forEach((cid,i)=>{
      if(res[cid]) return;
      res[cid]={x:Math.max(8,Math.min(152,res[pid].x-spread/2+i*14)),y:Math.min(170,res[pid].y+20)};
    });
  }
  return res;
}

function buildSephiroth(){
  const pos=computeSephPos();
  const eg=document.getElementById('seph-edges');
  const ng=document.getElementById('seph-nodes');
  eg.innerHTML='';ng.innerHTML='';
  const NS='http://www.w3.org/2000/svg';
  Object.entries(CHILDREN).forEach(([pid,kids])=>{
    if(!pos[pid]) return;
    kids.forEach(cid=>{
      if(!pos[cid]) return;
      const l=document.createElementNS(NS,'line');
      l.setAttribute('x1',pos[pid].x);l.setAttribute('y1',pos[pid].y);
      l.setAttribute('x2',pos[cid].x);l.setAttribute('y2',pos[cid].y);
      l.dataset.from=pid;l.dataset.to=cid;
      eg.appendChild(l);
    });
  });
  Object.entries(pos).forEach(([id,p])=>{
    if(!NODES[id]) return;
    const color=SEPH_COLORS[NODES[id].category]||'#fff';
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',6);
    c.setAttribute('fill',color);c.setAttribute('fill-opacity',.38);
    c.style.color=color;c.dataset.id=id;
    c.addEventListener('click',()=>applySelection(id,true));
    ng.appendChild(c);
    const lbl=document.createElementNS(NS,'text');
    lbl.setAttribute('x',p.x);lbl.setAttribute('y',p.y+12);
    lbl.classList.add('seph-label');lbl.dataset.id=id;
    lbl.textContent=NODES[id].label.replace('\n',' ');
    lbl.addEventListener('click',()=>applySelection(id,true));
    lbl.style.cursor='pointer';
    ng.appendChild(lbl);
  });
}

function updateSephiroth(activeId){
  const path=new Set(pathTo(activeId));
  document.querySelectorAll('#seph-nodes circle').forEach(c=>{
    const id=c.dataset.id;
    if(id===activeId){c.classList.add('seph-active');c.setAttribute('fill-opacity',1);}
    else if(path.has(id)){c.classList.remove('seph-active');c.setAttribute('fill-opacity',.65);}
    else{c.classList.remove('seph-active');c.setAttribute('fill-opacity',.22);}
  });
  document.querySelectorAll('#seph-nodes .seph-label').forEach(l=>{
    l.classList.toggle('label-active',l.dataset.id===activeId);
  });
  document.querySelectorAll('#seph-edges line').forEach(l=>{
    l.classList.toggle('path-active',path.has(l.dataset.from)&&path.has(l.dataset.to));
  });
}

// ════════════════════════════════════════════════════════
//  ARRANQUE
// ════════════════════════════════════════════════════════
buildSephiroth();
buildGraph();
