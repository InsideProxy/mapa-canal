<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy — Mapa del Canal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #020208;
      --surface: rgba(3,3,14,0.9);
      --border: rgba(0,210,255,0.07);
      --border-hi: rgba(0,210,255,0.22);
      --text: #bfd0e0;
      --text-dim: rgba(191,208,224,0.38);
      --c-root: #a855f7;
      --c-proxy: #22d3ee;
      --c-proj:  #fb923c;
      --c-cont:  #4ade80;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 12px;
    }

    /* ── GRID ──────────────────────────────────── */
    #grid {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,210,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,210,255,0.022) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── BACKGROUND ────────────────────────────── */
    .bg-layer {
      position: fixed; inset: 0;
      background-size: cover; background-position: center;
      transition: opacity 1.2s cubic-bezier(0.4,0,0.2,1);
      opacity: 0; z-index: 0;
    }
    .bg-layer.active { opacity: 1; }
    .bg-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 35%, rgba(2,2,10,0.45) 0%, rgba(2,2,10,0.92) 75%);
      z-index: 1;
    }

    /* ── PARTICLES ─────────────────────────────── */
    #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; width: 1px; height: 1px;
      background: rgba(0,210,255,0.35);
      animation: pfloat linear infinite;
    }
    @keyframes pfloat {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── CY ────────────────────────────────────── */
    #cy { position: fixed; inset: 40px 0 0 0; z-index: 3; background: transparent; }

    /* ── TOPBAR ────────────────────────────────── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 40px;
      background: rgba(2,2,12,0.82);
      border-bottom: 1px solid var(--border-hi);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; padding: 0 12px; gap: 10px;
      z-index: 200;
    }
    #topbar-logo {
      font-family: var(--mono); font-size: 10px; font-weight: 500;
      color: var(--c-proxy); letter-spacing: 3px; text-transform: uppercase;
      white-space: nowrap; flex-shrink: 0;
      text-shadow: 0 0 14px var(--c-proxy);
    }
    .t-sep { width: 1px; height: 16px; background: var(--border-hi); flex-shrink: 0; }
    #breadcrumb {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 500; overflow: hidden; flex: 1;
      font-family: var(--mono);
    }
    .bc { color: rgba(191,208,224,0.22); white-space: nowrap; cursor: pointer; transition: color 0.2s; }
    .bc:hover { color: var(--c-proxy); }
    .bc.cur { color: rgba(191,208,224,0.65); cursor: default; }
    .bc-sep { color: var(--border-hi); }
    #btn-edit {
      background: transparent; border: 1px solid var(--border-hi);
      color: var(--c-proxy); font-family: var(--mono); font-size: 9px;
      padding: 3px 8px; cursor: pointer; letter-spacing: 1px; flex-shrink: 0;
      transition: background 0.2s; text-transform: uppercase;
    }
    #btn-edit:hover { background: rgba(0,210,255,0.08); }
    #topbar-hint { font-size: 9px; color: rgba(191,208,224,0.14); white-space: nowrap; flex-shrink: 0; font-family: var(--mono); }

    /* ── PANEL (content, right) ────────────────── */
    #panel {
      position: fixed; top: 40px; right: 0; bottom: 0;
      width: 275px;
      background: rgba(3,3,16,0.9);
      border-left: 1px solid var(--border-hi);
      backdrop-filter: blur(28px);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      z-index: 150; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(0,210,255,0.08) transparent;
    }
    #panel.open { transform: translateX(0); }
    #panel-inner { padding: 20px 18px 50px; }
    #btn-close {
      position: absolute; top: 9px; right: 9px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); width: 22px; height: 22px;
      cursor: pointer; font-size: 10px; font-family: var(--mono);
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    #btn-close:hover { border-color: var(--c-proxy); color: var(--c-proxy); }
    #p-cat { font-family: var(--mono); font-size: 8px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 7px; }
    #p-title { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 14px; }
    #p-body { font-size: 11px; line-height: 1.85; color: rgba(191,208,224,0.58); }
    #p-body p { margin-bottom: 11px; }
    #p-body p:last-child { margin-bottom: 0; }
    #p-body strong { color: rgba(191,208,224,0.88); }
    #p-body em { color: rgba(191,208,224,0.72); }
    #p-body a { color: var(--c-proxy); text-decoration: none; }
    #p-body a:hover { text-decoration: underline; }
    #p-body ul { margin: 7px 0 11px 16px; line-height: 1.95; }
    #p-body pre { font-family: var(--mono); font-size: 9px; color: rgba(191,208,224,0.48); line-height: 1.7; background: rgba(0,210,255,0.03); border: 1px solid var(--border); padding: 9px 10px; margin: 9px 0; overflow-x: auto; white-space: pre; }
    .hr { height: 1px; background: var(--border); margin: 14px 0; }
    #p-body img { width: 100%; margin-bottom: 11px; display: block; object-fit: cover; border: 1px solid var(--border); }
    .lbtn {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 9px; padding: 6px 12px;
      background: rgba(0,210,255,0.04); border: 1px solid rgba(0,210,255,0.18);
      color: var(--c-proxy) !important; font-size: 10px; font-family: var(--mono);
      text-decoration: none !important; transition: all 0.2s;
    }
    .lbtn:hover { background: rgba(0,210,255,0.09) !important; border-color: rgba(0,210,255,0.38); }
    .badge {
      display: inline-block; padding: 2px 8px;
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 9px;
      background: rgba(0,210,255,0.05); color: var(--c-proxy);
      border: 1px solid rgba(0,210,255,0.18);
    }

    /* ── EDITOR PANEL (left) ───────────────────── */
    #editor {
      position: fixed; top: 40px; left: 0; bottom: 0;
      width: 270px;
      background: rgba(2,2,13,0.96);
      border-right: 1px solid var(--border-hi);
      backdrop-filter: blur(28px);
      transform: translateX(-100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      z-index: 160; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(0,210,255,0.08) transparent;
    }
    #editor.open { transform: translateX(0); }
    #editor-inner { padding: 12px 12px 50px; }
    .ed-head { font-family: var(--mono); font-size: 10px; color: #fff; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border-hi); }
    .ed-sec { margin-bottom: 14px; }
    .ed-lbl { display: block; font-family: var(--mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--c-proxy); margin-bottom: 4px; }
    .ed-lbl.dim { color: var(--text-dim); letter-spacing: 0; text-transform: none; font-size: 9px; }
    .ed-in, .ed-sel, .ed-ta {
      width: 100%; background: rgba(0,210,255,0.03); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 10px; padding: 5px 7px;
      transition: border-color 0.2s; resize: vertical;
    }
    .ed-in:focus, .ed-sel:focus, .ed-ta:focus { outline: none; border-color: rgba(0,210,255,0.38); }
    .ed-ta { min-height: 100px; }
    .ed-sel option { background: #04040e; }
    .ed-btn {
      display: inline-block; padding: 4px 10px;
      background: rgba(0,210,255,0.04); border: 1px solid rgba(0,210,255,0.18);
      color: var(--c-proxy); font-family: var(--mono); font-size: 9px;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s; margin-top: 5px;
    }
    .ed-btn:hover { background: rgba(0,210,255,0.1); }
    .ed-btn.del { color: #f87171; border-color: rgba(248,113,113,0.25); }
    .ed-btn.del:hover { background: rgba(248,113,113,0.08); }
    .ed-btn.ok { color: var(--c-cont); border-color: rgba(74,222,128,0.25); }
    .ed-btn.ok:hover { background: rgba(74,222,128,0.08); }
    .ed-div { height: 1px; background: var(--border); margin: 12px 0; }
    .ed-nodelist { max-height: 130px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(0,210,255,0.08) transparent; margin-bottom: 4px; }
    .ed-ni { padding: 3px 7px; font-family: var(--mono); font-size: 9px; color: var(--text-dim); cursor: pointer; transition: all 0.12s; border-left: 2px solid transparent; }
    .ed-ni:hover { color: var(--text); background: rgba(0,210,255,0.04); }
    .ed-ni.on { border-left-color: var(--c-proxy); color: var(--c-proxy); background: rgba(0,210,255,0.06); }
    #ed-msg { font-family: var(--mono); font-size: 9px; color: var(--c-cont); margin-top: 5px; min-height: 14px; }

    /* ── LEGEND ────────────────────────────────── */
    #legend {
      position: fixed; bottom: 212px; left: 10px;
      background: rgba(2,2,12,0.72); border: 1px solid var(--border);
      padding: 9px 13px; z-index: 100; backdrop-filter: blur(18px);
    }
    #legend h4 { font-family: var(--mono); font-size: 7px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(191,208,224,0.2); margin-bottom: 7px; }
    .li { display: flex; align-items: center; gap: 6px; font-size: 9px; color: rgba(191,208,224,0.32); margin-bottom: 4px; }
    .li:last-child { margin-bottom: 0; }
    .ld { width: 6px; height: 6px; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }

    /* ── SEPHIROTH ─────────────────────────────── */
    #sephiroth {
      position: fixed; bottom: 10px; left: 10px;
      width: 160px; height: 195px; z-index: 100;
      pointer-events: auto; opacity: 0.38; transition: opacity 0.4s;
    }
    #sephiroth:hover { opacity: 0.9; }
    #sephiroth line { stroke: rgba(0,210,255,0.07); stroke-width: 1; transition: stroke 0.4s; }
    #sephiroth line.path-active { stroke: rgba(0,210,255,0.28); stroke-width: 1.5; }
    #sephiroth circle { cursor: pointer; transition: r 0.3s, fill-opacity 0.3s; }
    #sephiroth circle:hover { r: 8; fill-opacity: 1; }
    #sephiroth .seph-active { r: 8; fill-opacity: 1; filter: drop-shadow(0 0 5px currentColor); }
    #sephiroth .seph-label { font-family: var(--mono); font-size: 5.5px; fill: rgba(191,208,224,0.22); text-anchor: middle; pointer-events: none; }
    #sephiroth .seph-label.label-active { fill: rgba(191,208,224,0.82); }
  </style>
</head>
<body>

<div id="grid"></div>
<div class="bg-layer" id="bg-root"      style="background-image:url('img/stars.png')"></div>
<div class="bg-layer" id="bg-proxy"     style="background-image:url('img/neuron.png')"></div>
<div class="bg-layer" id="bg-proyectos" style="background-image:url('img/alchemy.png')"></div>
<div class="bg-layer" id="bg-contenidos" style="background-image:url('img/library.png')"></div>
<div class="bg-overlay"></div>
<div id="particles"></div>

<div id="topbar">
  <span id="topbar-logo">PROXY</span>
  <div class="t-sep"></div>
  <div id="breadcrumb"></div>
  <button id="btn-edit" onclick="toggleEditor()">[EDIT]</button>
  <span id="topbar-hint">click nodo → info</span>
</div>

<div id="cy"></div>

<!-- Panel de contenido (derecha) -->
<div id="panel">
  <div id="panel-inner">
    <button id="btn-close" onclick="closePanel()">✕</button>
    <div id="p-cat"></div>
    <div id="p-title"></div>
    <div id="p-body"></div>
  </div>
</div>

<!-- Panel de edición (izquierda) -->
<div id="editor">
  <div id="editor-inner">
    <div class="ed-head">// EDITOR DE NODOS</div>

    <div class="ed-sec">
      <span class="ed-lbl">Nodos</span>
      <div class="ed-nodelist" id="ed-list"></div>
    </div>

    <div class="ed-div"></div>

    <div class="ed-sec">
      <span class="ed-lbl">Editar seleccionado</span>
      <span class="ed-lbl dim">ID: <span id="ed-sel-id">—</span></span>
      <span class="ed-lbl" style="margin-top:6px">Label</span>
      <input class="ed-in" id="ed-label" type="text" placeholder="Label del nodo">
      <span class="ed-lbl" style="margin-top:6px">Categoría</span>
      <select class="ed-sel" id="ed-category">
        <option value="root">root</option>
        <option value="proxy">proxy</option>
        <option value="proyectos">proyectos</option>
        <option value="contenidos">contenidos</option>
      </select>
      <span class="ed-lbl" style="margin-top:6px">Título del panel</span>
      <input class="ed-in" id="ed-title" type="text" placeholder="Título visible">
      <span class="ed-lbl" style="margin-top:6px">Contenido HTML</span>
      <textarea class="ed-ta" id="ed-html" placeholder="<p>Texto...</p>"></textarea>
      <div>
        <button class="ed-btn ok" onclick="saveEdit()">Guardar</button>
        <button class="ed-btn del" onclick="deleteNode()" style="margin-left:5px">Eliminar</button>
      </div>
    </div>

    <div class="ed-div"></div>

    <div class="ed-sec">
      <span class="ed-lbl">Añadir nodo</span>
      <span class="ed-lbl" style="margin-top:4px">ID (sin espacios)</span>
      <input class="ed-in" id="ed-new-id" type="text" placeholder="mi-nodo">
      <span class="ed-lbl" style="margin-top:5px">Label</span>
      <input class="ed-in" id="ed-new-label" type="text" placeholder="Mi Nodo">
      <span class="ed-lbl" style="margin-top:5px">Padre</span>
      <select class="ed-sel" id="ed-new-parent"></select>
      <span class="ed-lbl" style="margin-top:5px">Categoría</span>
      <select class="ed-sel" id="ed-new-cat">
        <option value="root">root</option>
        <option value="proxy">proxy</option>
        <option value="proyectos">proyectos</option>
        <option value="contenidos">contenidos</option>
      </select>
      <button class="ed-btn" onclick="addNode()" style="margin-top:7px">+ Añadir</button>
    </div>

    <div class="ed-div"></div>

    <div class="ed-sec">
      <button class="ed-btn del" onclick="resetAll()">↺ Resetear todo</button>
      <div id="ed-msg"></div>
    </div>
  </div>
</div>

<div id="legend">
  <h4>Categorías</h4>
  <div class="li"><div class="ld" style="color:#a855f7;background:#a855f7"></div>El Canal</div>
  <div class="li"><div class="ld" style="color:#22d3ee;background:#22d3ee"></div>Proxy</div>
  <div class="li"><div class="ld" style="color:#fb923c;background:#fb923c"></div>Proyectos</div>
  <div class="li"><div class="ld" style="color:#4ade80;background:#4ade80"></div>Contenidos</div>
</div>

<svg id="sephiroth" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
  <g id="seph-edges"></g>
  <g id="seph-nodes"></g>
</svg>

<script>
// ════════════════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════════════════
(function() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (14 + Math.random() * 26) + 's';
    p.style.animationDelay   = (Math.random() * 22) + 's';
    const s = (0.8 + Math.random() * 1.4) + 'px';
    p.style.width = p.style.height = s;
    c.appendChild(p);
  }
})();

// ════════════════════════════════════════════════════════
//  BACKGROUND
// ════════════════════════════════════════════════════════
const BG_MAP = { root:'bg-root', proxy:'bg-proxy', proyectos:'bg-proyectos', contenidos:'bg-contenidos' };
let currentBg = null;
function switchBg(cat) {
  const id = BG_MAP[cat] || BG_MAP.root;
  if (id === currentBg) return;
  document.querySelectorAll('.bg-layer').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentBg = id;
}

  canal:      ['proxy','proyectos','contenidos'],

  'pandora-hw':[], 'pandora-esq':[], 'pandora-proto':[],

const KD = {

    html:`<p>Bienvenido al mapa interactivo del canal <strong>Proxy</strong>.</p><p>Haz clic en cualquier nodo para ver su contenido. El grafo muestra toda la estructura del canal.</p>` },
  proxy:    { color:'#22d3ee', category:'Proxy', title:'Proxy',
    html:`<p>Sección dedicada al autor del canal, sus obras y sus medios de contacto.</p>` },
  autor:    { color:'#22d3ee', category:'Proxy', title:'Sobre el Autor',

function loadData() {
  try {
    const s = localStorage.getItem('mapa-v2');
    if (s) {
      const d = JSON.parse(s);
      return { nodes: d.nodes || clone(ND), children: d.children || clone(CD), content: d.content || clone(KD) };
    }
  } catch(e) {}
  return { nodes: clone(ND), children: clone(CD), content: clone(KD) };
}
function saveData() {
  localStorage.setItem('mapa-v2', JSON.stringify({ nodes: NODES, children: CHILDREN, content: CONTENT }));
}
function clone(o) { return JSON.parse(JSON.stringify(o)); }

const { nodes: NODES, children: CHILDREN, content: CONTENT } = loadData();

const PARENT = { canal: null };
function rebuildParent() {
  Object.keys(PARENT).forEach(k => { if (k !== 'canal') delete PARENT[k]; });
  Object.entries(CHILDREN).forEach(([p, cs]) => cs.forEach(c => PARENT[c] = p));
}
rebuildParent();

// ════════════════════════════════════════════════════════
//  TREE LAYOUT
// ════════════════════════════════════════════════════════
function computeTreeLayout() {
  const HGAP = 100, VGAP = 120;
  const lv = {};

  function countLeaves(id) {
    const kids = CHILDREN[id] || [];
    if (!kids.length) { lv[id] = 1; return 1; }
    let s = 0; kids.forEach(k => s += countLeaves(k));
    lv[id] = s; return s;
  }
  countLeaves('canal');

  const pos = {};
  function assign(id, depth, xStart) {
    const kids = CHILDREN[id] || [];
    const span = (lv[id] || 1) * HGAP;
    pos[id] = { x: xStart + span / 2, y: depth * VGAP };
    let cursor = xStart;
    kids.forEach(k => { assign(k, depth + 1, cursor); cursor += (lv[k] || 1) * HGAP; });
  }
  assign('canal', 0, 0);

  // Fallback for orphaned nodes
  Object.keys(NODES).forEach(id => { if (!pos[id]) pos[id] = { x: 0, y: 700 }; });
  return pos;
}

// ════════════════════════════════════════════════════════
//  BUILD FULL GRAPH
// ════════════════════════════════════════════════════════
let treePos = {};
let selectedId = null;

function buildFullGraph() {
  stopAmbient();
  cy.elements().remove();
  treePos = computeTreeLayout();

  Object.values(NODES).forEach(n => {
    const p = treePos[n.id] || { x: 0, y: 0 };
    cy.add({
      group: 'nodes',
      data: { id: n.id, label: n.label, category: n.category, type: n.type || '', image: n.image || 'none', _bx: p.x, _by: p.y },
      position: { ...p },
    });
  });

  let ei = 0;
  Object.entries(CHILDREN).forEach(([pid, kids]) => {
    kids.forEach(cid => {
      if (NODES[pid] && NODES[cid])
        cy.add({ group: 'edges', data: { id: `e${ei++}`, source: pid, target: cid } });
    });
  });

  cy.fit(cy.elements(), 55);
  selectNode(selectedId || 'canal', false);
  startAmbient();
}

// ════════════════════════════════════════════════════════
//  SELECT NODE
// ════════════════════════════════════════════════════════
function selectNode(id, showPanel = true) {
  if (!NODES[id]) return;
  selectedId = id;

  const neighbors = new Set([
    ...(CHILDREN[id] || []),
    ...(PARENT[id] != null ? [PARENT[id]] : []),
  ]);

  // Limpiar estilos inline antes de que las clases tomen el control
  cy.nodes().removeStyle('width height shadow-blur shadow-opacity border-opacity border-width');

  cy.nodes().forEach(node => {
    node.removeClass('sel neighbor distant');
    const nid = node.id();
    if (nid === id) node.addClass('sel');
    else if (neighbors.has(nid)) node.addClass('neighbor');
    else node.addClass('distant');
  });

  cy.edges().forEach(edge => {
    edge.removeClass('e-on e-off');
    const src = edge.source().id(), tgt = edge.target().id();
    if (src === id || tgt === id) edge.addClass('e-on');
    else edge.addClass('e-off');
  });

  updateTopBar(id);
  updateSephiroth(id);
  switchBg(NODES[id].category);
  if (showPanel) openPanel(id);
}

function pathTo(id) {
  const p = []; let c = id;
  while (c !== null && c !== undefined) { p.unshift(c); c = PARENT[c]; }
  return p;
}

function updateTopBar(id) {
  const path = pathTo(id);
  document.getElementById('breadcrumb').innerHTML = path.map((nid, i) => {
    const lbl = NODES[nid].label.replace('\n', ' ');
    const sep = i > 0 ? '<span class="bc-sep"> / </span>' : '';
    if (i === path.length - 1) return sep + '<span class="bc cur">' + lbl + '</span>';
    return sep + '<span class="bc" onclick="selectNode(\'' + nid + '\',true)">' + lbl + '</span>';
  }).join('');
}

// ════════════════════════════════════════════════════════
//  SEAWEED ANIMATION (todos los nodos)
// ════════════════════════════════════════════════════════
let animFrame = null, animStart = null, animRunning = false;

function ambientLoop(ts) {
  if (!animRunning) return;
  if (!animStart) animStart = ts;
  const t = (ts - animStart) / 1000;

  try {
    cy.nodes().forEach((node, i) => {
      if (!node.inside()) return;
      const isSel = node.hasClass('sel');
      const isNbr = node.hasClass('neighbor');
      const isCard = node.data('type') === 'card';
      const bx = node.data('_bx'), by = node.data('_by');
      if (bx === undefined) return;

      // Amplitude: distant nodes sway more (seaweed in current)
      const amp  = isSel ? 1.2 : isNbr ? 3.2 : 7.5;
      const spd  = 0.42 + (i % 7) * 0.07;
      const ph   = i * 1.9 + (node.id().charCodeAt(0) || 0) * 0.08;

      node.position({
        x: bx + amp * Math.sin(t * spd + ph),
        y: by + amp * 0.65 * Math.cos(t * spd * 0.78 + ph + 1.3),
      });

      // Glow pulse on selected (solo sombra/borde, nunca tamaño inline)
      if (isSel) {
        const s = Math.sin(t * 1.55);
        node.style({
          'shadow-opacity': +(0.62 + 0.22 * s).toFixed(2),
          'shadow-blur': Math.round(36 + 11 * s),
          'border-opacity': +(0.65 + 0.18 * s).toFixed(2),
        });
      }
    });

    cy.edges('.e-on').forEach((edge, i) => {
      if (!edge.inside()) return;
      edge.style('opacity', +(0.68 + 0.22 * Math.sin(t * 1.4 + i)).toFixed(2));
    });
  } catch(e) {}

  if (animRunning) animFrame = requestAnimationFrame(ambientLoop);
}

function startAmbient() {
  stopAmbient();
  animStart = null; animRunning = true;
  animFrame = requestAnimationFrame(ambientLoop);
}
function stopAmbient() {
  animRunning = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

function edSelect(id) {
  edSelId = id;
  const n = NODES[id], c = CONTENT[id] || {};
  document.getElementById('ed-sel-id').textContent = id;
  document.getElementById('ed-label').value    = n.label;
  document.getElementById('ed-category').value = n.category;
  document.getElementById('ed-title').value    = c.title || '';
  document.getElementById('ed-html').value     = c.html  || '';
  refreshEdList();
}

function saveEdit() {
  if (!edSelId) { edMsg('Selecciona un nodo'); return; }
  const id = edSelId;
  const label = document.getElementById('ed-label').value.trim();
  const cat   = document.getElementById('ed-category').value;
  const title = document.getElementById('ed-title').value.trim();
  const html  = document.getElementById('ed-html').value;
  const color = CAT_COLORS[cat] || '#fff';

  NODES[id].label = label;
  NODES[id].category = cat;
  if (!CONTENT[id]) CONTENT[id] = { color, category: cat, title, html };
  else Object.assign(CONTENT[id], { color, category: cat, title, html });

  const cyNode = cy.getElementById(id);
  if (cyNode.length) cyNode.data({ label, category: cat });

  saveData();
  edMsg('✓ Guardado');
  refreshEdList();
}

function deleteNode() {
  if (!edSelId) { edMsg('Selecciona un nodo'); return; }
  const id = edSelId;
  if (id === 'canal') { edMsg('No se puede eliminar la raíz'); return; }
  if ((CHILDREN[id] || []).length) { edMsg('Elimina antes sus hijos: ' + CHILDREN[id].join(', ')); return; }

  const pid = PARENT[id];
  if (pid && CHILDREN[pid]) CHILDREN[pid] = CHILDREN[pid].filter(c => c !== id);
  delete NODES[id]; delete CHILDREN[id]; delete PARENT[id]; delete CONTENT[id];
  edSelId = null;
  document.getElementById('ed-sel-id').textContent = '—';
  saveData(); edMsg('✓ Nodo eliminado');
  buildFullGraph(); buildSephiroth(); refreshEdList();
}

function addNode() {
  const id    = document.getElementById('ed-new-id').value.trim();
  const label = document.getElementById('ed-new-label').value.trim();
  const pid   = document.getElementById('ed-new-parent').value;
  const cat   = document.getElementById('ed-new-cat').value;

  if (!id || !label || !pid) { edMsg('Rellena todos los campos'); return; }
  if (NODES[id]) { edMsg('ID ya existe'); return; }
  if (!/^[a-z0-9_-]+$/.test(id)) { edMsg('ID: solo a-z, 0-9, guión'); return; }

  NODES[id] = { id, label, category: cat };
  CHILDREN[id] = [];
  PARENT[id] = pid;
  if (!CHILDREN[pid]) CHILDREN[pid] = [];
  CHILDREN[pid].push(id);
  CONTENT[id] = { color: CAT_COLORS[cat] || '#fff', category: cat, title: label, html: `<p>${label}</p>` };

  document.getElementById('ed-new-id').value = '';
  document.getElementById('ed-new-label').value = '';
  saveData(); edMsg('✓ Nodo añadido: ' + id);
  buildFullGraph(); buildSephiroth(); refreshEdList();
}

function resetAll() {
  if (!confirm('¿Resetear todo al estado original?')) return;
  localStorage.removeItem('mapa-v2');
  location.reload();
}

function edMsg(msg) {
  const el = document.getElementById('ed-msg');
  el.textContent = msg;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

// ════════════════════════════════════════════════════════
//  SEPHIROTH MINIMAP
// ════════════════════════════════════════════════════════
const SEPH_COLORS = { root:'#a855f7', proxy:'#22d3ee', proyectos:'#fb923c', contenidos:'#4ade80' };
const SEPH_POS = {
  canal:     { x:80, y:16  },
  proxy:     { x:35, y:46  }, proyectos: { x:80, y:52  }, contenidos: { x:125, y:46 },
  autor:     { x:22, y:78  }, libros:    { x:48, y:82  }, ayudar:    { x:35, y:108 },
  ariadna:   { x:65, y:82  }, teseo:     { x:80, y:96  }, galatea:   { x:95, y:82  },
  tematicas: { x:125, y:78 },
  contacto:  { x:12, y:130 }, linktree:  { x:32, y:135 },
  polaris:   { x:35, y:158 }, arcana:    { x:52, y:164 }, grimorio:  { x:18, y:164 },
  poetica:   { x:112,y:108 }, ciencia:   { x:138,y:108 }, filosofia: { x:125,y:135 },
};

function computeSephPos() {
  const res = { ...SEPH_POS };
  const queue = ['canal'], seen = new Set(['canal']);
  while (queue.length) {
    const pid = queue.shift();
    (CHILDREN[pid] || []).forEach(c => { if (!seen.has(c)) { seen.add(c); queue.push(c); } });
    if (!res[pid]) continue;
    const unpos = (CHILDREN[pid] || []).filter(c => !SEPH_POS[c]);
    if (!unpos.length) continue;
    const spread = (unpos.length - 1) * 14;
    unpos.forEach((cid, i) => {
      if (res[cid]) return;
      res[cid] = {
        x: Math.max(8, Math.min(152, res[pid].x - spread/2 + i*14)),
        y: Math.min(170, res[pid].y + 20),
      };
    });
  }
  return res;
}

function buildSephiroth() {
  const pos = computeSephPos();
  const eg = document.getElementById('seph-edges');
  const ng = document.getElementById('seph-nodes');
  eg.innerHTML = ''; ng.innerHTML = '';
  const NS = 'http://www.w3.org/2000/svg';

  Object.entries(CHILDREN).forEach(([pid, kids]) => {
    if (!pos[pid]) return;
    kids.forEach(cid => {
      if (!pos[cid]) return;
      const l = document.createElementNS(NS, 'line');
      l.setAttribute('x1', pos[pid].x); l.setAttribute('y1', pos[pid].y);
      l.setAttribute('x2', pos[cid].x); l.setAttribute('y2', pos[cid].y);
      l.dataset.from = pid; l.dataset.to = cid;
      eg.appendChild(l);
    });
  });

  Object.entries(pos).forEach(([id, p]) => {
    if (!NODES[id]) return;
    const color = SEPH_COLORS[NODES[id].category] || '#fff';
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 6);
    c.setAttribute('fill', color); c.setAttribute('fill-opacity', 0.38);
    c.style.color = color; c.dataset.id = id;
    c.addEventListener('click', () => selectNode(id, true));
    ng.appendChild(c);

    const lbl = document.createElementNS(NS, 'text');
    lbl.setAttribute('x', p.x); lbl.setAttribute('y', p.y + 12);
    lbl.classList.add('seph-label'); lbl.dataset.id = id;
    lbl.textContent = NODES[id].label.replace('\n', ' ');
    lbl.addEventListener('click', () => selectNode(id, true));
    lbl.style.cursor = 'pointer';
    ng.appendChild(lbl);
  });
}

function updateSephiroth(activeId) {
  const path = new Set(pathTo(activeId));
  document.querySelectorAll('#seph-nodes circle').forEach(c => {
    const id = c.dataset.id;
    if (id === activeId) { c.classList.add('seph-active'); c.setAttribute('fill-opacity', 1); }
    else if (path.has(id)) { c.classList.remove('seph-active'); c.setAttribute('fill-opacity', 0.65); }
    else { c.classList.remove('seph-active'); c.setAttribute('fill-opacity', 0.22); }
  });
  document.querySelectorAll('#seph-nodes .seph-label').forEach(l => {
    l.classList.toggle('label-active', l.dataset.id === activeId);
  });
  document.querySelectorAll('#seph-edges line').forEach(l => {
    l.classList.toggle('path-active', path.has(l.dataset.from) && path.has(l.dataset.to));
  });
}

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
buildSephiroth();
buildFullGraph();
