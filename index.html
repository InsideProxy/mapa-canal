  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      background: #050510;
      color: #dde0f5;
      height: 100vh;
      overflow: hidden;
    }

    /* ── BACKGROUND SYSTEM ──────────────────── */
    .bg-layer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      z-index: 0;
    }
    .bg-layer.active { opacity: 1; }
    .bg-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(5,5,16,0.55) 0%, rgba(5,5,16,0.85) 70%);
      z-index: 1;
    }

    /* ── PARTICLES ───────────────────────────── */
    #particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    #cy {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      background: transparent;
    }

    /* ── GRID OVERLAY ────────────────────────── */
    #grid-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── TOP BAR ─────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: rgba(5,5,16,0.65);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 12px;
      z-index: 200;
    }

    #btn-back {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 5px 14px;
      color: #8aafff;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    #btn-back:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
    #btn-back.vis { display: flex; }

    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      flex: 1;
    }
    .bc { color: rgba(255,255,255,0.25); white-space: nowrap; cursor: pointer; transition: color 0.2s; }
    .bc:hover { color: #8aafff; }
    .bc.cur { color: rgba(255,255,255,0.7); cursor: default; }
    .bc-sep { color: rgba(255,255,255,0.12); font-size: 11px; }

    #topbar-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      white-space: nowrap;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── PANEL ───────────────────────────────── */
    #panel {
      position: fixed;
      top: 50px; right: 0; bottom: 0;
      width: 456px;
      background: rgba(8,8,22,0.75);
      border-left: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      z-index: 150;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    #panel.open { transform: translateX(0); }

    #panel-inner { padding: 34px 29px 72px; }

    #btn-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3);
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #btn-close:hover { background: rgba(255,255,255,0.12); color: #fff; }

    #p-cat  {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 12px;

    #p-title {

      color: #fff;

    .lbtn {

      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #8aafff !important;

      backdrop-filter: blur(10px);

    .lbtn:hover { background: rgba(255,255,255,0.1) !important; border-color: rgba(255,255,255,0.18); }

    .badge {
      display: inline-block; padding: 3px 12px;

      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.05);
      color: #7eb8f7;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ── LEGEND ──────────────────────────────── */
    #legend {
      position: fixed; bottom: 228px; left: 16px;
      background: rgba(5,5,16,0.6);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 18px;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    #legend h4 {
      font-size: 11px;
      letter-spacing: 2.5px;

      color: rgba(255,255,255,0.2);
      margin-bottom: 10px;

      flex-shrink: 0;

      font-size: 11px;
      color: rgba(255,255,255,0.12);
      z-index: 100;
      font-weight: 500;

    /* ── SEPHIROTH MINIMAP ──────────────────── */
    #sephiroth {
      position: fixed;
      bottom: 20px;
      left: 16px;
      width: 170px;
      height: 200px;
      z-index: 100;
      pointer-events: auto;
      opacity: 0.5;
      transition: opacity 0.4s;
    }
    #sephiroth:hover { opacity: 1; }
    #sephiroth line {
      stroke: rgba(255,255,255,0.1);
      stroke-width: 1;
      transition: stroke 0.4s, stroke-opacity 0.4s;
    }
    #sephiroth line.path-active {
      stroke: rgba(255,255,255,0.35);
      stroke-width: 1.5;
    }
    #sephiroth circle {
      cursor: pointer;
      transition: r 0.3s, fill-opacity 0.3s, filter 0.3s;
    }
    #sephiroth circle:hover {
      r: 9;
      fill-opacity: 1;
    }
    #sephiroth .seph-active {
      r: 9;
      fill-opacity: 1;
      filter: drop-shadow(0 0 8px currentColor);
    }
    #sephiroth .seph-label {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      fill: rgba(255,255,255,0.3);
      text-anchor: middle;
      pointer-events: none;
      transition: fill 0.3s;
    }
    #sephiroth .seph-label.label-active {
      fill: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    /* ── CATEGORY TRANSITION INDICATOR ───────── */
    #category-indicator {
      position: fixed;
      top: 50%; left: 50%;

      text-transform: uppercase;
      font-weight: 700;
      color: rgba(255,255,255,0);
      z-index: 50;
      pointer-events: none;
      transition: color 0.6s;
    }
    #category-indicator.show {
      color: rgba(255,255,255,0.15);
    }
  </style>
</head>

//  PARTICLES

(function initParticles() {
  const container = document.getElementById('particles');
  const count = 35;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.width = p.style.height = (1.5 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
})();

// ════════════════════════════════════════════════════════
//  BACKGROUND MANAGEMENT
// ════════════════════════════════════════════════════════

const BG_MAP = {
  root: 'bg-root',
  proxy: 'bg-proxy',
  proyectos: 'bg-proyectos',
  contenidos: 'bg-contenidos',
};

let currentBg = null;

function switchBackground(category) {
  const bgId = BG_MAP[category] || BG_MAP.root;
  if (bgId === currentBg) return;

  document.querySelectorAll('.bg-layer').forEach(el => el.classList.remove('active'));
  document.getElementById(bgId).classList.add('active');
  currentBg = bgId;
}

let currentId = null;
let busy = false;

// ════════════════════════════════════════════════════════
//  POSITIONS
// ════════════════════════════════════════════════════════

function positions(parentId, nodeId, childIds) {
  const n = childIds.length;
  const VSTEP = 115;
  const HSTEP = 115;
  const pos = {};

  const hasParent = !!parentId;
  const currentY = hasParent ? -60 : (n > 0 ? -90 : 0);
  const parentY  = currentY - VSTEP;
  const childY   = currentY + VSTEP;

  if (hasParent) pos[parentId] = { x: 0, y: parentY };
  pos[nodeId] = { x: 0, y: currentY };

  if (n > 0) {
    const totalW = (n - 1) * HSTEP;
    childIds.forEach((id, i) => {
      pos[id] = { x: -totalW / 2 + i * HSTEP, y: childY };
    });
  }

  return pos;
}

// ════════════════════════════════════════════════════════
//  RESOLVE CATEGORY for background

function resolveCategory(nodeId) {
  const cat = NODES[nodeId].category;
  return cat;
}

// ════════════════════════════════════════════════════════
//  BUILD FULL GRAPH (called once at boot)
// ════════════════════════════════════════════════════════

function buildFullGraph() {
  Object.values(NODES).forEach(n => {
    cy.add({
      group: 'nodes',
      data: { id: n.id, label: n.label, category: n.category, type: n.type || '', image: n.image || 'none' },
      classes: 'r-distant',
      style: { opacity: 0 },
    });
  });
  Object.entries(CHILDREN).forEach(([parent, children]) => {
    children.forEach(child => {
      cy.add({
        group: 'edges',
        data: { id: `e-${parent}-${child}`, source: parent, target: child },
        classes: 'e-distant',
        style: { opacity: 0 },
      });
    });
  });
  cy.layout({
    name: 'breadthfirst',
    roots: ['canal'],
    directed: true,
    spacingFactor: 1.1,
    padding: 50,
    avoidOverlap: true,
  }).run();
}

// ════════════════════════════════════════════════════════
//  NAVIGATE
// ════════════════════════════════════════════════════════

async function navigate(nodeId, showPanel = true) {
  if (busy) return;
  if (nodeId === currentId) {
    if (showPanel) openPanel(nodeId);
    return;
  }

  busy = true;
  stopAmbient();

  const parentId = PARENT[nodeId];
  const childIds = CHILDREN[nodeId] || [];
  const isFirst  = currentId === null;

  switchBackground(resolveCategory(nodeId));

  // ── Clear inline size styles only from previously active node ──
  if (currentId) {
    cy.getElementById(currentId).removeStyle('width height shadow-opacity shadow-blur border-opacity');
  }
  cy.nodes('.leaf-sel').removeStyle('width height shadow-opacity shadow-blur border-opacity');

  // ── Reclassify nodes ──
  cy.nodes().removeClass('r-current r-parent r-child r-distant leaf-sel');
  cy.getElementById(nodeId).addClass('r-current');
  if (parentId) cy.getElementById(parentId).addClass('r-parent');
  childIds.forEach(id => cy.getElementById(id).addClass('r-child'));
  cy.nodes().forEach(n => {
    if (!n.hasClass('r-current') && !n.hasClass('r-parent') && !n.hasClass('r-child')) {
      n.addClass('r-distant');
    }
  });

  // ── Reclassify edges ──
  cy.edges().removeClass('e-up e-down e-distant');
  cy.edges().forEach(edge => {
    const src = edge.data('source');
    const tgt = edge.data('target');
    const connectsCurrent = src === nodeId || tgt === nodeId;
    if (!connectsCurrent) { edge.addClass('e-distant'); return; }
    const other = src === nodeId ? tgt : src;
    if (other === parentId) edge.addClass('e-up');
    else if (childIds.includes(other)) edge.addClass('e-down');
    else edge.addClass('e-distant');
  });

  // ── Fit to active cluster ──
  const activeEles = cy.nodes('.r-current, .r-child, .r-parent');
  if (isFirst) {
    cy.fit(activeEles, 100);
  } else {
    cy.animate({ fit: { eles: activeEles, padding: 100 } }, { duration: 420 });
  }

  // ── Animate opacity ──
  const DUR = 420;
  const anims = [];
  const rCur  = cy.nodes('.r-current');
  const rCh   = cy.nodes('.r-child');
  const rPar  = cy.nodes('.r-parent');
  const rDist = cy.nodes('.r-distant');
  const eDn   = cy.edges('.e-down');
  const eUp   = cy.edges('.e-up');
  const eDist = cy.edges('.e-distant');

  if (rCur.length)  anims.push(new Promise(r => rCur .animate({ style:{ opacity:1    } }, { duration:DUR, complete:r })));
  if (rCh.length)   anims.push(new Promise(r => rCh  .animate({ style:{ opacity:1    } }, { duration:DUR, complete:r })));
  if (rPar.length)  anims.push(new Promise(r => rPar .animate({ style:{ opacity:0.42 } }, { duration:DUR, complete:r })));
  if (rDist.length) anims.push(new Promise(r => rDist.animate({ style:{ opacity:0.18 } }, { duration:DUR, complete:r })));
  if (eDn.length)   anims.push(new Promise(r => eDn  .animate({ style:{ opacity:0.8  } }, { duration:DUR, complete:r })));
  if (eUp.length)   anims.push(new Promise(r => eUp  .animate({ style:{ opacity:0.3  } }, { duration:DUR, complete:r })));
  if (eDist.length) anims.push(new Promise(r => eDist.animate({ style:{ opacity:0.08 } }, { duration:DUR, complete:r })));

  await Promise.all(anims);

  currentId = nodeId;
  busy = false;

  startAmbient();
  updateTopBar(nodeId);
  updateSephiroth(nodeId);
  if (showPanel) openPanel(nodeId);
}

function goBack() {
  const p = PARENT[currentId];
  if (p !== null && p !== undefined) navigate(p, true);
}

// ════════════════════════════════════════════════════════
//  TOP BAR
// ════════════════════════════════════════════════════════

function pathTo(nodeId) {
  const p = [];
  let c = nodeId;
  while (c !== null && c !== undefined) { p.unshift(c); c = PARENT[c]; }
  return p;
}

function updateTopBar(nodeId) {
  const path = pathTo(nodeId);
  const isRoot = PARENT[nodeId] === null;

  const btn = document.getElementById('btn-back');
  if (isRoot) {
    btn.classList.remove('vis');
  } else {
    const pLabel = NODES[PARENT[nodeId]].label.replace('\n', ' ');
    btn.innerHTML = '&larr; ' + pLabel;
    btn.classList.add('vis');
  }

  document.getElementById('breadcrumb').innerHTML = path.map((id, i) => {
    const lbl = NODES[id].label.replace('\n', ' ');
    const sep = i > 0 ? '<span class="bc-sep">&#8250;</span>' : '';
    if (i === path.length - 1) return sep + '<span class="bc cur">' + lbl + '</span>';
    return sep + '<span class="bc" onclick="navigate(\'' + id + '\',true)">' + lbl + '</span>';
  }).join('');

  const hasKids = CHILDREN[nodeId] && CHILDREN[nodeId].length > 0;
  document.getElementById('topbar-hint').textContent = hasKids
    ? 'Clic en nodo hijo para expandir'
    : 'Sin subnodos — clic en \u2190 para volver';
}

// ════════════════════════════════════════════════════════
//  PANEL
// ════════════════════════════════════════════════════════

function openPanel(nodeId) {
  const d = CONTENT[nodeId];
  if (!d) return;
  document.getElementById('p-cat').innerHTML =
    '<span style="color:' + d.color + '">' + d.category + '</span>';
  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-body').innerHTML = d.html;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  cy.nodes().removeClass('leaf-sel');
}

//  EVENTS
// ════════════════════════════════════════════════════════

cy.on('tap', 'node', evt => {
  const id = evt.target.id();
  const hasKids = CHILDREN[id] && CHILDREN[id].length > 0;

  if (hasKids) {
    navigate(id, true);
  } else {
    cy.nodes().removeClass('leaf-sel');
    evt.target.addClass('leaf-sel');
    updateSephiroth(id);
    openPanel(id);
  }
});

cy.on('tap', evt => {
  if (evt.target === cy) closePanel();
});

cy.on('mouseover', 'node', () => document.body.style.cursor = 'pointer');
cy.on('mouseout',  'node', () => document.body.style.cursor = 'default');

//  AMBIENT ANIMATIONS
// ════════════════════════════════════════════════════════

let animFrame = null;
let animStart = null;
let animRunning = false;

function ambientLoop(timestamp) {
  if (!animRunning) return;
  if (!animStart) animStart = timestamp;
  const t = (timestamp - animStart) / 1000;

  try {
    // Pulse: leaf-sel takes priority, otherwise r-current
    const leaf = cy.nodes('.leaf-sel');
    const cur = leaf.length ? leaf : cy.nodes('.r-current');
    if (cur.length && cur.inside()) {
      const sin18 = Math.sin(t * 1.8);
      const isCard = cur.data('type') === 'card';
      const styleUpdate = {
        'shadow-opacity': Math.round((0.4 + 0.25 * sin18) * 100) / 100,
        'shadow-blur': Math.round(28 + 14 * sin18),
        'border-opacity': Math.round((0.3 + 0.2 * sin18) * 100) / 100,
      };
      if (!isCard) {
        const baseSize = leaf.length ? 78 : 118;
        const range = leaf.length ? 4 : 8;
        const size = Math.round(baseSize + range * sin18);
        styleUpdate['width'] = size;
        styleUpdate['height'] = size;
      }
      cur.style(styleUpdate);
    }

    // Elastic float on all visible nodes
    cy.nodes().forEach((node, i) => {
      if (!node.inside()) return;
      const basePos = node.data('_basePos');
      if (!basePos) return;
      const phase = i * 1.9;

      if (node.hasClass('r-current')) {
        // Current: gentle sway, already has size pulse above
        const dx = 1.8 * Math.sin(t * 0.55 + phase);
        const dy = 2.2 * Math.cos(t * 0.45 + phase);
        node.position({ x: basePos.x + dx, y: basePos.y + dy });
      } else if (node.hasClass('r-child')) {
        // Children: more lively elastic bounce
        const dx = 3.2 * Math.sin(t * 0.72 + phase);
        const dy = 3.8 * Math.cos(t * 0.58 + phase);
        node.position({ x: basePos.x + dx, y: basePos.y + dy });
        node.style('shadow-opacity', Math.round((0.35 + 0.15 * Math.sin(t * 1.2 + phase)) * 100) / 100);
      } else if (node.hasClass('r-parent')) {
        // Parent: subtle drift
        const dx = 1.5 * Math.sin(t * 0.4 + phase);
        const dy = 1.5 * Math.cos(t * 0.35 + phase);
        node.position({ x: basePos.x + dx, y: basePos.y + dy });
      } else if (node.hasClass('r-distant')) {
        // Distant: barely perceptible drift
        const dx = 0.8 * Math.sin(t * 0.3 + phase);
        const dy = 0.8 * Math.cos(t * 0.28 + phase);
        node.position({ x: basePos.x + dx, y: basePos.y + dy });
      }
    });

    // Edge glow wave
    cy.edges('.e-down').forEach((edge, i) => {
      if (!edge.inside()) return;
      const op = Math.round((0.55 + 0.2 * Math.sin(t * 1.5 + i * 1.5)) * 100) / 100;
      edge.style('opacity', op);
    });
  } catch (e) {
    // Node removed mid-frame, safe to ignore
  }

  if (animRunning) animFrame = requestAnimationFrame(ambientLoop);
}

function storeBasePositions() {
  cy.nodes().forEach(node => {
    node.data('_basePos', { ...node.position() });
  });
}

function startAmbient() {
  stopAmbient();
  storeBasePositions();
  animStart = null;
  animRunning = true;
  animFrame = requestAnimationFrame(ambientLoop);
}

function stopAmbient() {
  animRunning = false;
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
}

// ════════════════════════════════════════════════════════
//  SEPHIROTH MINIMAP (Tree of Life)
// ════════════════════════════════════════════════════════

const SEPH_COLORS = {
  root: '#a78bfa',
  proxy: '#67e8f9',
  proyectos: '#fbbf24',
  contenidos: '#6ee7b7',
};

// Positions arranged as Kabbalistic Tree of Life
// 3 pillars: Left (Severity), Center (Balance), Right (Mercy)
const SEPH_POS = {
  // Crown — Keter
  canal:      { x: 80, y: 16 },
  // Row 2 — 3 pillars
  proxy:      { x: 35, y: 46 },
  proyectos:  { x: 80, y: 52 },
  contenidos: { x: 125, y: 46 },
  // Row 3 — children spread on pillars
  autor:      { x: 22, y: 78 },
  libros:     { x: 48, y: 82 },
  ayudar:     { x: 35, y: 108 },
  ariadna:    { x: 65, y: 82 },
  teseo:      { x: 80, y: 96 },
  galatea:    { x: 95, y: 82 },
  tematicas:  { x: 125, y: 78 },
  // Row 4 — leaves
  contacto:   { x: 12, y: 130 },
  linktree:   { x: 32, y: 135 },
  polaris:    { x: 35, y: 158 },
  arcana:     { x: 52, y: 164 },
  grimorio:   { x: 18, y: 164 },
  poetica:    { x: 112, y: 108 },
  ciencia:    { x: 138, y: 108 },
  filosofia:  { x: 125, y: 135 },
};

// Auto-computes positions for nodes absent from SEPH_POS,
// based on their parent's position and sibling index.
// Nodes in SEPH_POS keep their manual (Kabbalistic) position.
function computeSephPos() {
  const result = { ...SEPH_POS };

  // BFS so parents are always resolved before children
  const queue = ['canal'];
  const seen = new Set(['canal']);
  while (queue.length) {
    const pid = queue.shift();
    (CHILDREN[pid] || []).forEach(c => {
      if (!seen.has(c)) { seen.add(c); queue.push(c); }
    });

    if (!result[pid]) continue; // parent has no position yet — skip

    const unpositioned = (CHILDREN[pid] || []).filter(c => !SEPH_POS[c]);
    if (!unpositioned.length) continue;

    const spread = (unpositioned.length - 1) * 14;
    unpositioned.forEach((cid, i) => {
      if (result[cid]) return; // already computed
      result[cid] = {
        x: Math.max(8, Math.min(152, result[pid].x - spread / 2 + i * 14)),
        y: Math.min(170, result[pid].y + 20),
      };
    });
  }

  return result;
}

function buildSephiroth() {
  const pos = computeSephPos();
  const edgesG = document.getElementById('seph-edges');
  const nodesG = document.getElementById('seph-nodes');
  edgesG.innerHTML = '';
  nodesG.innerHTML = '';

  const svgNS = 'http://www.w3.org/2000/svg';

  // Draw edges
  Object.entries(CHILDREN).forEach(([pid, kids]) => {
    if (!pos[pid]) return;
    const p = pos[pid];
    kids.forEach(cid => {
      if (!pos[cid]) return;
      const c = pos[cid];
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', p.x);
      line.setAttribute('y1', p.y);
      line.setAttribute('x2', c.x);
      line.setAttribute('y2', c.y);
      line.dataset.from = pid;
      line.dataset.to = cid;
      edgesG.appendChild(line);
    });
  });

  // Draw nodes
  Object.entries(pos).forEach(([id, nodePos]) => {
    if (!NODES[id]) return;
    const cat = NODES[id].category;
    const color = SEPH_COLORS[cat] || '#fff';

    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', nodePos.x);
    circle.setAttribute('cy', nodePos.y);
    circle.setAttribute('r', 7);
    circle.setAttribute('fill', color);
    circle.setAttribute('fill-opacity', 0.4);
    circle.style.color = color;
    circle.dataset.id = id;
    circle.addEventListener('click', () => navigate(id, true));
    nodesG.appendChild(circle);

    // Label
    const label = document.createElementNS(svgNS, 'text');
    label.setAttribute('x', nodePos.x);
    label.setAttribute('y', nodePos.y + 13);
    label.classList.add('seph-label');
    label.dataset.id = id;
    label.textContent = NODES[id].label.replace('\n', ' ');
    label.addEventListener('click', () => navigate(id, true));
    label.style.cursor = 'pointer';
    nodesG.appendChild(label);
  });
}

function updateSephiroth(activeId) {
  const path = pathTo(activeId);
  const pathSet = new Set(path);

  // Update nodes
  document.querySelectorAll('#seph-nodes circle').forEach(c => {
    const id = c.dataset.id;
    if (id === activeId) {
      c.classList.add('seph-active');
      c.setAttribute('fill-opacity', 1);
    } else if (pathSet.has(id)) {
      c.classList.remove('seph-active');
      c.setAttribute('fill-opacity', 0.7);
    } else {
      c.classList.remove('seph-active');
      c.setAttribute('fill-opacity', 0.25);
    }
  });

  // Update labels
  document.querySelectorAll('#seph-nodes .seph-label').forEach(l => {
    const id = l.dataset.id;
    if (id === activeId) {
      l.classList.add('label-active');
    } else {
      l.classList.remove('label-active');
    }
  });

  // Update edges
  document.querySelectorAll('#seph-edges line').forEach(l => {
    const from = l.dataset.from;
    const to = l.dataset.to;
    if (pathSet.has(from) && pathSet.has(to)) {
      l.classList.add('path-active');
    } else {
      l.classList.remove('path-active');
    }
  });
}

buildSephiroth();
